      - { id: "e16", source: "1734300007003", sourceHandle: source, target: "1734300007006", targetHandle: target, type: custom, zIndex: 1002, data: { isInIteration: true, iteration_id: "1734300007001", sourceType: llm, targetType: variable-aggregator } }
      - { id: "e17", source: "1734300007004", sourceHandle: source, target: "1734300007006", targetHandle: target, type: custom, zIndex: 1002, data: { isInIteration: true, iteration_id: "1734300007001", sourceType: llm, targetType: variable-aggregator } }
      - { id: "e18", source: "1734300007005", sourceHandle: source, target: "1734300007006", targetHandle: target, type: custom, zIndex: 1002, data: { isInIteration: true, iteration_id: "1734300007001", sourceType: llm, targetType: variable-aggregator } }
      - { id: "e19", source: "1734300007006", sourceHandle: source, target: "1734300007007", targetHandle: target, type: custom, zIndex: 1002, data: { isInIteration: true, iteration_id: "1734300007001", sourceType: variable-aggregator, targetType: if-else } }
      - { id: "e20", source: "1734300007007", sourceHandle: "true", target: "1734300007008", targetHandle: target, type: custom, zIndex: 1002, data: { isInIteration: true, iteration_id: "1734300007001", sourceType: if-else, targetType: tool } }
