      - { id: "e10", source: "1734300005001", sourceHandle: source, target: "1734300006001", targetHandle: target, type: custom, zIndex: 0, data: { sourceType: iteration, targetType: code } }
      - { id: "e11", source: "1734300006001", sourceHandle: source, target: "1734300007001", targetHandle: target, type: custom, zIndex: 0, data: { sourceType: code, targetType: iteration } }
      - { id: "e12", source: "1734300007001start", sourceHandle: source, target: "1734300007002", targetHandle: target, type: custom, zIndex: 1002, data: { isInIteration: true, iteration_id: "1734300007001", sourceType: iteration-start, targetType: question-classifier } }
